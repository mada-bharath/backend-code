<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Bharath Vidya</title>
    <meta name="description" content="Login to the Bharath Vidya learner portal to access courses, videos, study materials, and progress tracking.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://bharathvidya.com/login">
    <meta property="og:site_name" content="Bharath Vidya">
    <meta property="og:title" content="Login - Bharath Vidya">
    <meta property="og:description" content="Access your Bharath Vidya online courses and learner portal.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bharathvidya.com/login">
    <link rel="stylesheet" href="/learner/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">BV</span>
          <div>
            <strong>BharathVidya</strong>
            <small>Learner Portal</small>
          </div>
        </div>

        <nav class="nav-list" aria-label="Primary">
          <button class="nav-item active" type="button" data-view="coursesView">My Courses</button>
          <button class="nav-item" type="button" data-view="playerView">Course Player</button>
          <button class="nav-item" type="button" data-view="discussionView">Discussion</button>
          <button class="nav-item" type="button" data-view="wishlistView">Wishlist</button>
          <button class="nav-item" type="button" data-view="levelUpView">Level Up</button>
          <button class="nav-item" type="button" data-view="accountView">My Account</button>
          <button class="nav-item hidden" id="adminSettingsNav" type="button" data-view="adminSettingsView">Site Settings</button>
        </nav>

        <nav class="site-links" aria-label="Website">
          <a href="/">Home</a>
          <a href="/courses">Courses</a>
          <a href="/login" aria-current="page">Login</a>
          <a href="/contact">Contact</a>
          <a href="/about">About</a>
        </nav>

        <div class="session-panel">
          <span id="sessionName">Signed out</span>
          <button class="ghost-button" id="logoutButton" type="button">Logout</button>
        </div>
      </aside>

      <main class="main">
        <section class="view active" id="authView" aria-label="Login">
          <div class="auth-panel">
            <form class="auth-form" id="loginForm">
              <h1>Welcome back</h1>
              <label>
                Email
                <input id="emailInput" autocomplete="email" type="email" required>
              </label>
              <label>
                Password
                <input id="passwordInput" autocomplete="current-password" type="password" required>
              </label>
              <button class="primary-button" type="submit">Login</button>
              <button class="ghost-button" id="showSignupButton" type="button">Create Account</button>
            </form>

            <form class="auth-form hidden" id="signupForm">
              <h1>Create account</h1>
              <label>
                Name
                <input id="signupName" autocomplete="name" type="text" required>
              </label>
              <label>
                Email
                <input id="signupEmail" autocomplete="email" type="email" required>
              </label>
              <label>
                Phone
                <input id="signupPhone" autocomplete="tel" type="tel">
              </label>
              <label>
                Password
                <input id="signupPassword" autocomplete="new-password" type="password" minlength="6" required>
              </label>
              <label class="checkbox-row">
                <input id="acceptedPolicies" type="checkbox" required>
                <span>
                  I agree to the
                  <a href="/terms-and-conditions" data-policy-link="terms">Terms and Conditions</a>,
                  <a href="/privacy-policy" data-policy-link="privacy">Privacy Policy</a>, and
                  <a href="/refund-and-return-policy" data-policy-link="refund">Refund and Return Policy</a>.
                </span>
              </label>
              <button class="primary-button" type="submit">Create Account</button>
              <button class="ghost-button" id="showLoginButton" type="button">Back to Login</button>
            </form>
            <p class="status-line" id="authStatus"></p>
          </div>
        </section>

        <section class="view" id="coursesView" aria-label="My Courses">
          <div class="section-header">
            <div>
              <p class="eyebrow">Courses</p>
              <h1>My Courses</h1>
            </div>
            <form class="inline-form" id="courseIdForm">
              <input id="courseIdInput" placeholder="Course ID" aria-label="Course ID">
              <button class="secondary-button" type="submit">Open</button>
            </form>
          </div>
          <div class="course-grid" id="courseGrid"></div>
        </section>

        <section class="view" id="playerView" aria-label="Course Player">
          <div class="player-topbar">
            <div>
              <p class="eyebrow" id="courseTutor">Tutor</p>
              <h1 id="courseTitle">Course Player</h1>
            </div>
            <div class="course-progress">
              <span id="courseProgressLabel">0%</span>
              <div class="meter"><span id="courseProgressBar"></span></div>
            </div>
          </div>

          <div class="player-layout">
            <section class="lesson-stage" aria-label="Lesson">
              <div class="media-frame" id="mediaFrame">
                <video id="lessonVideo" playsinline></video>
                <iframe id="materialFrame" title="Study material preview"></iframe>
                <div class="empty-state" id="emptyState">Select a lesson</div>
              </div>

              <div class="control-bar">
                <button class="icon-button" id="playButton" type="button">Play</button>
                <button class="icon-button" id="muteButton" type="button">Sound</button>
                <select id="qualitySelect" aria-label="Clarity">
                  <option value="auto">Auto</option>
                  <option value="1080p">1080p</option>
                  <option value="720p">720p</option>
                  <option value="480p">480p</option>
                </select>
                <select id="languageSelect" aria-label="Language">
                  <option value="en">English</option>
                  <option value="hi">Hindi</option>
                  <option value="te">Telugu</option>
                  <option value="ta">Tamil</option>
                </select>
                <button class="icon-button" id="fullscreenButton" type="button">Full</button>
              </div>

              <div class="lesson-actions">
                <button class="secondary-button" id="previousButton" type="button">Previous</button>
                <button class="secondary-button" id="downloadAttachmentButton" type="button">Download Attachment</button>
                <button class="primary-button" id="completeButton" type="button">Completed</button>
                <button class="secondary-button" id="nextButton" type="button">Next</button>
              </div>
            </section>

            <aside class="content-panel" aria-label="Modules">
              <div class="tabs">
                <button class="tab active" type="button" data-panel="modulesPanel">Modules</button>
                <button class="tab" type="button" data-panel="materialsPanel">Study Materials</button>
              </div>
              <div class="tab-panel active" id="modulesPanel"></div>
              <div class="tab-panel" id="materialsPanel">
                <div class="material-toolbar">
                  <button class="ghost-button" id="zoomOutButton" type="button">Zoom Out</button>
                  <span id="pageLabel">Page</span>
                  <button class="ghost-button" id="zoomInButton" type="button">Zoom In</button>
                  <button class="ghost-button" id="printButton" type="button">Print</button>
                  <button class="ghost-button" id="materialFullscreenButton" type="button">Full</button>
                </div>
                <div id="materialsList"></div>
              </div>
            </aside>
          </div>
        </section>

        <section class="view" id="discussionView" aria-label="Discussion">
          <div class="section-header">
            <div>
              <p class="eyebrow">Community</p>
              <h1>Discussion</h1>
            </div>
          </div>
          <div class="stack-list" id="discussionList"></div>
        </section>

        <section class="view" id="wishlistView" aria-label="Wishlist">
          <div class="section-header">
            <div>
              <p class="eyebrow">Saved</p>
              <h1>Wishlist</h1>
            </div>
          </div>
          <div class="course-grid" id="wishlistGrid"></div>
        </section>

        <section class="view" id="levelUpView" aria-label="Level Up">
          <div class="section-header">
            <div>
              <p class="eyebrow">Progress</p>
              <h1>Level Up</h1>
            </div>
          </div>
          <div class="level-grid" id="levelUpGrid"></div>
        </section>

        <section class="view" id="accountView" aria-label="My Account">
          <div class="section-header">
            <div>
              <p class="eyebrow">Account</p>
              <h1>My Account</h1>
            </div>
          </div>

          <div class="account-tabs">
            <button class="tab active" type="button" data-panel="overviewPanel">Overview</button>
            <button class="tab" type="button" data-panel="billingPanel">Billing</button>
            <button class="tab" type="button" data-panel="passwordPanel">Change Password</button>
          </div>

          <div class="tab-panel active" id="overviewPanel">
            <form class="account-form" id="profileForm">
              <label>
                Name
                <input id="profileName" type="text">
              </label>
              <label>
                Email
                <input id="profileEmail" type="email">
              </label>
              <label>
                Phone
                <input id="profilePhone" type="tel">
              </label>
              <label>
                Bio
                <textarea id="profileBio" rows="3"></textarea>
              </label>
              <button class="primary-button" type="submit">Save Profile</button>
            </form>
          </div>

          <div class="tab-panel" id="billingPanel">
            <div class="billing-list" id="billingList"></div>
          </div>

          <div class="tab-panel" id="passwordPanel">
            <form class="account-form" id="passwordForm">
              <label>
                Current Password
                <input id="currentPassword" autocomplete="current-password" type="password" required>
              </label>
              <label>
                New Password
                <input id="newPassword" autocomplete="new-password" type="password" minlength="6" required>
              </label>
              <button class="primary-button" type="submit">Update Password</button>
            </form>
          </div>

          <p class="status-line" id="accountStatus"></p>
        </section>

        <section class="view" id="policyView" aria-label="Policy">
          <div class="section-header">
            <div>
              <p class="eyebrow">Policy</p>
              <h1 id="policyTitle">Policy</h1>
            </div>
          </div>
          <article class="policy-panel" id="policyContent"></article>
        </section>

        <section class="view" id="adminSettingsView" aria-label="Site Settings">
          <div class="section-header">
            <div>
              <p class="eyebrow">Admin</p>
              <h1>Site Settings</h1>
            </div>
          </div>

          <form class="settings-form" id="siteSettingsForm">
            <label>
              Footer Description
              <textarea id="footerDescriptionInput" rows="4"></textarea>
            </label>
            <div class="form-grid">
              <label>
                Emails
                <textarea id="footerEmailsInput" rows="5"></textarea>
              </label>
              <label>
                Phone Numbers
                <textarea id="footerPhonesInput" rows="5"></textarea>
              </label>
            </div>
            <label>
              Terms and Conditions
              <textarea id="termsPolicyInput" rows="8"></textarea>
            </label>
            <label>
              Privacy Policy
              <textarea id="privacyPolicyInput" rows="8"></textarea>
            </label>
            <label>
              Refund and Return Policy
              <textarea id="refundPolicyInput" rows="8"></textarea>
            </label>
            <button class="primary-button" type="submit">Save Settings</button>
            <p class="status-line" id="settingsStatus"></p>
          </form>
        </section>

        <footer class="site-footer hidden" id="siteFooter" aria-label="Footer"></footer>
      </main>
    </div>

    <script src="/learner/app.js" defer></script>
  </body>
</html>
